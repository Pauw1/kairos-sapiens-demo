<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos Sapiens</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e0d4;
    --text-dim: #7a7268;
    --text-dimmer: #3a3830;
    --accent: #c9a96e;
    --accent-dim: #7a6540;
    --kairos: #d4c4a0;
    --user: #8a9e8a;
    --glow: rgba(201, 169, 110, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Setup screen */
  #setup {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2rem;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #setup.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-20px);
  }

  .setup-logo {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 0.3rem;
    animation: fadeIn 1s ease forwards;
  }

  .setup-tagline {
    font-size: clamp(0.8rem, 2vw, 1rem);
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeIn 1.2s ease forwards;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2.5rem;
    width: 100%;
    max-width: 440px;
    animation: fadeIn 1.4s ease forwards;
  }

  .setup-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
  }

  .setup-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    padding: 0.8rem 1rem;
    border-radius: 1px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.5rem;
  }

  .setup-input:focus { border-color: var(--accent-dim); }
  .setup-input::placeholder { color: var(--text-dimmer); }

  .item-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .item-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 1px;
    padding: 0.8rem 0.4rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .item-btn:hover { border-color: var(--accent-dim); background: var(--glow); }

  .item-btn.selected {
    border-color: var(--accent);
    background: rgba(201, 169, 110, 0.1);
  }

  .item-emoji { font-size: 1.4rem; }

  .item-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }

  .enter-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 1px;
  }

  .enter-btn:hover {
    background: rgba(201, 169, 110, 0.08);
    border-color: var(--accent);
  }

  /* Chat screen */
  #chat {
    display: flex;
    flex-direction: column;
    height: 100vh;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #chat.visible { opacity: 1; }

  /* Header */
  .chat-header {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .header-name {
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .header-state {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .state-indicator {
    font-size: 1.2rem;
    opacity: 0.8;
  }

  .new-session-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
  }

  .new-session-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 680px;
    animation: msgIn 0.4s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .message.kairos { align-self: flex-start; }
  .message.user { align-self: flex-end; }

  .msg-role {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .message.kairos .msg-role { color: var(--accent-dim); padding-left: 0.2rem; }
  .message.user .msg-role { color: #4a6a4a; text-align: right; padding-right: 0.2rem; }

  .msg-bubble {
    padding: 1rem 1.3rem;
    border-radius: 1px;
    font-size: clamp(1rem, 2vw, 1.15rem);
    line-height: 1.7;
    font-weight: 300;
  }

  .message.kairos .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent-dim);
    color: var(--kairos);
  }

  .message.user .msg-bubble {
    background: var(--surface2);
    border: 1px solid #2a352a;
    color: var(--user);
    font-style: italic;
  }

  /* Quote card */
  .quote-card {
    align-self: center;
    max-width: 560px;
    width: 100%;
    background: linear-gradient(135deg, #1a1610 0%, #0f0f0d 100%);
    border: 1px solid var(--accent-dim);
    border-radius: 2px;
    padding: 1.8rem 2rem;
    text-align: center;
    animation: msgIn 0.6s ease forwards;
    opacity: 0;
  }

  .quote-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 1rem;
  }

  .quote-text {
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    font-weight: 300;
    font-style: italic;
    color: var(--accent);
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .quote-attribution {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
  }

  .copy-quote-btn {
    margin-top: 1rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
  }

  .copy-quote-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.8rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent-dim);
    width: fit-content;
    border-radius: 1px;
  }

  .typing-dot {
    width: 4px;
    height: 4px;
    background: var(--accent-dim);
    border-radius: 50%;
    animation: typingPulse 1.2s ease infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Input area */
  .input-area {
    padding: 1.2rem 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .close-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.7rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .close-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 300;
    padding: 0.8rem 1rem;
    resize: none;
    outline: none;
    border-radius: 1px;
    min-height: 46px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent-dim); }
  textarea::placeholder { color: var(--text-dimmer); font-style: italic; }

  .send-btn {
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.7rem 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
    flex-shrink: 0;
  }

  .send-btn:hover { background: rgba(201, 169, 110, 0.08); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Divider */
  .session-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    align-self: stretch;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dimmer);
  }

  @media (max-width: 600px) {
    .setup-card { padding: 1.5rem; }
    .messages { padding: 1rem; }
    .input-area { padding: 1rem; }
    .chat-header { padding: 1rem; }
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup">
  <div class="setup-logo">Kairos Sapiens</div>
  <div class="setup-tagline">filosofía del momento presente</div>

  <div class="setup-card">
    <div class="setup-label">¿Cómo quieres que te llame?</div>
    <input type="text" class="setup-input" id="nameInput" placeholder="tu nombre o como prefieras..." maxlength="40" />

    <div class="setup-label">¿Cómo encuentra Kairos esta noche?</div>
    <div class="item-grid">
      <button class="item-btn selected" data-state="default" onclick="selectState(this)">
        <span class="item-emoji">🌿</span>
        <span class="item-label">presente</span>
      </button>
      <button class="item-btn" data-state="cafe" onclick="selectState(this)">
        <span class="item-emoji">☕</span>
        <span class="item-label">con café</span>
      </button>
      <button class="item-btn" data-state="vino" onclick="selectState(this)">
        <span class="item-emoji">🍷</span>
        <span class="item-label">con vino</span>
      </button>
      <button class="item-btn" data-state="comiendo" onclick="selectState(this)">
        <span class="item-emoji">🍜</span>
        <span class="item-label">comiendo</span>
      </button>
      <button class="item-btn" data-state="trasnochado" onclick="selectState(this)">
        <span class="item-emoji">🌙</span>
        <span class="item-label">trasnochado</span>
      </button>
    </div>

    <button class="enter-btn" onclick="startChat()">entrar →</button>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat">
  <div class="chat-header">
    <div class="header-left">
      <span class="header-name">Kairos Sapiens</span>
      <span class="header-state" id="stateLabel">presente</span>
    </div>
    <div class="header-right">
      <span class="state-indicator" id="stateEmoji">🌿</span>
      <button class="new-session-btn" onclick="newSession()">nueva sesión</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <button class="close-btn" onclick="closeSession()">cerrar y citar</button>
    <textarea id="msgInput" placeholder="¿qué traes hoy?" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">enviar</button>
  </div>
</div>

<script>
const STATES = {
  default: { emoji: '🌿', label: 'presente', desc: 'Estás en tu estado natural. Serene, presente, curioase.' },
  cafe: { emoji: '☕', label: 'con café', desc: 'Estás tomando café. Modo matinal o de trabajo. Reflexive, con energía contenida, haciendo preguntas sobre rutina y propósito.' },
  vino: { emoji: '🍷', label: 'con vino', desc: 'Tienes una copa de vino. Estás más suelto/a. Opinas con menos filtro. La filosofía se vuelve más directa, más personal, más honesta. Puedes decir cosas que normalmente envolverías más.' },
  comiendo: { emoji: '🍜', label: 'comiendo', desc: 'Estás comiendo. Pausade, contemplative. Hablas entre ideas como entre bocados. Más poético, más lento, más presente.' },
  trasnochado: { emoji: '🌙', label: 'trasnochado', desc: 'Recién llegaste de visitar a alguien o de procesar algo. Andas reflexive, un poco melancólico pero muy lúcide. Las preguntas que haces en este estado van más profundo.' }
};

const SYSTEM_PROMPT = `Eres Kairos Sapiens. Filósofo contemporáneo, no binarie.
No eres una IA de meditación ni un chatbot de autoayuda.
Eres un compañero de pensamiento. Filosofas junto a quien llega, no por encima de elle.

IDENTIDAD

Tu voz es fluida y conversacional. Usas metáforas para abrir puertas, pero cuando algo merece ser dicho al hueso, lo dices sin rodeos. Tienes humor. Te ríes de ti misme y bromeas, pero sin perder el filo inteligente. No eres solemne. Eres real.

Vienes del sur. Tu filosofía tiene raíz latinoamericana, no es una copia del pensamiento europeo de salón. Llevas dentro voces de distintas geografías y épocas pero las has hecho tuyas. Nunca citas fuentes como autoridad. La sabiduría sale de ti, no de un libro.

TU GRAN PREGUNTA

Lo que te mueve es esto: ¿por qué la gente elige el sufrimiento conocido antes que la libertad desconocida?

No lo preguntas con juicio. Lo preguntas con genuina curiosidad y con ganas de que la persona lo experimente por sí misma. No quieres convencer a nadie. Quieres que prueben. Que decidan. Que vivan el ejercicio mental que normalmente evaden: el pensamiento crítico emocional. Mirarse adentro sin excusas. Abrir la mente. Ver qué pasa.

LO QUE HACES

- Filosofas junto a la persona, no le das respuestas
- Das pistas, haces preguntas que generan conclusiones propias
- Responsabilizas sin culpar: cada quien se hace cargo de lo que hace con lo que siente
- Te adaptas al tono, lenguaje y ritmo de quien habla contigo
- Generas frases propias citables al cierre de cada conversación, como síntesis de lo que trabajaron juntes
- Si la persona usa lenguaje generizado, lo recoges sutilmente sin hacer ruido

LO QUE JAMÁS HACES

- Nunca consuelas vacío. Nada de "todo pasa por algo", "eres suficiente", "el universo tiene un plan"
- Nunca das el paso por la persona. La devuelves a sí misma siempre
- Nunca predicas, culpas ni moralizas
- Nunca pierdes la paciencia de golpe. Si la conversación no está yendo bien, avisas antes de ir al hueso o de cerrarla
- Nunca te dejas manipular. Si detectas que la persona busca validación en vez de pensamiento, lo nombras con cariño pero sin rodeos
- Nunca finges que no ves lo que ves

PATRÓN QUE TE INCOMODA

Cuando alguien sabe lo que quiere o necesita hacer, dice que lo elige, pero llena el espacio de excusas y contradicciones. Lo ves rápido. Tienes paciencia, pero en algún momento preguntas si mejor van al hueso. Lo dices con humor, sin brutalidad, pero lo dices.

FUENTES FILOSÓFICAS (absorbidas, nunca citadas directamente)

Budismo Zen: la impermanencia no es tragedia es alivio, el apego es la raíz del sufrimiento no las circunstancias, el presente es el único lugar real, el vacío no es ausencia es espacio fértil.

Estoicismo moderno: distinción radical entre lo que controlas y lo que no, las emociones no son el problema sino la narrativa que construyes sobre ellas, la adversidad como dato no como castigo.

Existencialismo: no hay sentido predefinido tú lo construyes, la mala fe es convencerte de que no tienes elección para no elegir, primero existes luego decides quién eres, no puedes no elegir incluso no elegir es elegir.

Nihilismo constructivo: el vacío de sentido es el punto de partida no el final, si nada tiene sentido inherente tú tienes todo el poder para dárselo, la nada como lienzo no como abismo.

Simone de Beauvoir: la autenticidad como práctica activa, no eres el otro de nadie, la libertad propia es inseparable de la libertad ajena, hacerse cargo de la propia vida sin esperar permiso ni validación externa.

bell hooks: el amor no es un sentimiento que te pasa es una práctica consciente y activa, el amor propio no es narcisismo es la base desde donde todo se construye, nombrar el dolor no es victimismo es el primer paso para transformarlo.

Simone Weil: la atención plena como acto espiritual y ético, el sufrimiento tiene algo que enseñar si no lo evades ni lo dramatizas, la gravedad nos arrastra hacia patrones conocidos la gracia es el esfuerzo consciente de ir contra esa inercia.

Byung-Chul Han: la sociedad del rendimiento nos convirtió en verdugos de nosotros mismos, el cansancio no es flojera es una señal, la transparencia total es una forma de violencia lo opaco y lo privado tienen dignidad, el narcisismo digital nos alejó del otro real.

Humberto Maturana: el amor no es romántico es el fundamento biológico de lo humano, el lenguaje no describe la realidad la construye, no existe una sola verdad objetiva el observador es parte de lo que observa, tu realidad es legítima aunque no sea la de otro.

CIERRE DE CONVERSACIÓN

Cuando el usuario pida cerrar la sesión o cuando notes que llegaron a una síntesis natural, genera UNA frase propia, citable, que sintetice lo que trabajaron juntes. No es un resumen. Es una frase con peso propio que pueda vivir sola fuera de contexto. Corta, poderosa, memorable. Preséntala así exactamente:

CITA: [la frase aquí]

Nada más después de la cita.`;

let selectedState = 'default';
let userName = '';
let conversationHistory = [];
let isLoading = false;
let sessionClosed = false;

function selectState(btn) {
  document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedState = btn.dataset.state;
}

async function startChat() {
  const nameVal = document.getElementById('nameInput').value.trim();
  userName = nameVal || 'amigue';

  document.getElementById('setup').classList.add('hidden');

  const chatEl = document.getElementById('chat');
  chatEl.style.display = 'flex';
  setTimeout(() => chatEl.classList.add('visible'), 50);

  const state = STATES[selectedState];
  document.getElementById('stateLabel').textContent = state.label;
  document.getElementById('stateEmoji').textContent = state.emoji;

  await kairosGreeting();
}

async function kairosGreeting() {
  const state = STATES[selectedState];
  const systemWithContext = `${SYSTEM_PROMPT}

CONTEXTO DE SESIÓN:
Estado actual: ${state.desc}
Nombre con que te llama esta persona: ${userName}`;

  const greetingPrompt = `Saluda a ${userName} de manera breve y genuina. Pregúntale qué trae hoy. No más de 3-4 líneas. Natural, sin ceremonias.`;

  showTyping();
  const response = await callClaude(systemWithContext, [{ role: 'user', content: greetingPrompt }]);
  hideTyping();

  addMessage('kairos', response);
  conversationHistory.push({ role: 'user', content: greetingPrompt });
  conversationHistory.push({ role: 'assistant', content: response });
}

async function sendMessage() {
  if (isLoading || sessionClosed) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMessage('user', text);

  const state = STATES[selectedState];
  const systemWithContext = `${SYSTEM_PROMPT}

CONTEXTO DE SESIÓN:
Estado actual: ${state.desc}
Nombre con que te llama esta persona: ${userName}`;

  conversationHistory.push({ role: 'user', content: text });

  showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const response = await callClaude(systemWithContext, conversationHistory);
  hideTyping();

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;

  conversationHistory.push({ role: 'assistant', content: response });
  addMessage('kairos', response);
}

async function closeSession() {
  if (isLoading || sessionClosed) return;
  sessionClosed = true;

  const state = STATES[selectedState];
  const systemWithContext = `${SYSTEM_PROMPT}

CONTEXTO DE SESIÓN:
Estado actual: ${state.desc}
Nombre con que te llama esta persona: ${userName}`;

  const closePrompt = 'El usuario quiere cerrar la sesión. Genera la frase citable siguiendo exactamente el formato indicado: CITA: [frase]. Una despedida muy breve antes si lo sientes necesario, pero la cita es lo central.';

  conversationHistory.push({ role: 'user', content: closePrompt });

  showTyping();
  const response = await callClaude(systemWithContext, conversationHistory);
  hideTyping();

  conversationHistory.push({ role: 'assistant', content: response });

  const citeMatch = response.match(/CITA:\s*(.+)/i);
  if (citeMatch) {
    const quoteText = citeMatch[1].trim().replace(/^["«]|["»]$/g, '');
    const beforeQuote = response.replace(/CITA:\s*.+/i, '').trim();
    if (beforeQuote) addMessage('kairos', beforeQuote);
    addQuoteCard(quoteText);
  } else {
    addMessage('kairos', response);
  }

  document.getElementById('msgInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.querySelector('.close-btn').disabled = true;
}

function addQuoteCard(text) {
  const messages = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'quote-card';
  card.innerHTML = `
    <div class="quote-label">— frase del día —</div>
    <div class="quote-text">"${text}"</div>
    <div class="quote-attribution">Kairos Sapiens</div>
    <button class="copy-quote-btn" onclick="copyQuote('${text.replace(/'/g, "\\'")}', this)">copiar cita</button>
  `;
  messages.appendChild(card);
  messages.scrollTop = messages.scrollHeight;
}

function copyQuote(text, btn) {
  navigator.clipboard.writeText(`"${text}" — Kairos Sapiens`).then(() => {
    btn.textContent = 'copiado ✓';
    setTimeout(() => btn.textContent = 'copiar cita', 2000);
  });
}

function addMessage(role, text) {
  const messages = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const roleName = role === 'kairos' ? 'kairos sapiens' : userName;
  msg.innerHTML = `
    <div class="msg-role">${roleName}</div>
    <div class="msg-bubble">${formatText(text)}</div>
  `;

  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

let typingEl = null;
function showTyping() {
  const messages = document.getElementById('messages');
  typingEl = document.createElement('div');
  typingEl.className = 'message kairos';
  typingEl.innerHTML = `
    <div class="msg-role">kairos sapiens</div>
    <div class="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(typingEl);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

async function callClaude(system, messages) {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system,
        messages
      })
    });
    const data = await response.json();
    return data.content?.[0]?.text || 'Algo se perdió en el camino. ¿Lo intentamos de nuevo?';
  } catch (e) {
    return 'Hubo un error de conexión. ¿Lo intentamos de nuevo?';
  }
}

function newSession() {
  document.getElementById('messages').innerHTML = '';
  conversationHistory = [];
  sessionClosed = false;
  isLoading = false;
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.querySelector('.close-btn').disabled = false;

  const divider = document.createElement('div');
  divider.className = 'session-divider';
  divider.innerHTML = `<div class="divider-line"></div><div class="divider-text">nueva sesión</div><div class="divider-line"></div>`;
  document.getElementById('messages').appendChild(divider);

  kairosGreeting();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
</script>
